<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>VerifAI</title>
  <style>
    @font-face {
      font-family: 'DM Serif Display';
      src: url('./DMSerifDisplay-Regular.ttf') format('truetype');
      font-weight: 400;
      font-display: block;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      -webkit-user-select: none;
      user-select: none;
      cursor: default;
      -webkit-app-region: drag;
    }

    .card {
      position: absolute;
      inset: 0;
      border-radius: 28px;
      background:
        radial-gradient(ellipse at 50% 30%, rgba(46, 51, 82, 0.35) 0%, rgba(46, 51, 82, 0) 60%),
        linear-gradient(180deg, #1a1a2e 0%, #14142a 55%, #0b0b12 100%);
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.55),
        0 0 0 1px rgba(255, 255, 255, 0.06) inset;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: card-in 220ms ease-out both;
    }

    .v {
      font-family: 'DM Serif Display', Georgia, serif;
      font-weight: 400;
      font-size: 192px;
      line-height: 1;
      color: #f2f2f5;
      letter-spacing: 0.01em;
      transform-origin: 50% 58%;
      animation: v-in 480ms cubic-bezier(0.22, 0.61, 0.36, 1) both;
    }

    .hairline {
      position: absolute;
      left: 40px; right: 40px; top: 22px;
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
    }

    @keyframes card-in {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes v-in {
      0%   { opacity: 0; transform: translateY(6px) scale(0.94); }
      60%  { opacity: 1; }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="hairline"></div>
    <div class="v">V</div>
  </div>
</body>
</html>
